<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strictly 2D Full Body Pikachu - Static</title>
  <style>
    /* --- Presentation Setup --- */
    body {
      margin: 0;
      padding: 0;
      background-color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Flat 2D Floor Shadow */
    .stage-shadow {
      position: absolute;
      bottom: 6%;
      width: 340px;
      height: 25px;
      background-color: rgba(0, 0, 0, 0.15);
      border-radius: 50%;
      z-index: 1;
    }

    /* --- Main Canvas --- */
    .pikachu-canvas {
      position: relative;
      width: 500px;
      height: 600px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 2;
      transform: translateY(15px);
    }

    /* --- FLAT LIGHTNING TAIL --- */
    .tail-container {
      position: absolute;
      left: 35px;
      bottom: 160px;
      width: 200px;
      height: 300px;
      z-index: 1;
      transform-origin: bottom right;
      transform: rotate(-10deg);
    }

    /* Flat Tail Segments with Clean Outlines */
    .tail-part {
      position: absolute;
      background-color: #F8D030;
      border: 6px solid #232323; /* Outlines match classic design constraints */
      box-sizing: border-box;
    }

    .tail-part.base {
      bottom: 0;
      right: 0;
      width: 32px;
      height: 75px;
      background: linear-gradient(to top, #A25B1F 45%, #F8D030 46%); /* Sharp 2D color split */
      transform: rotate(45deg);
      border-radius: 0 0 4px 4px;
    }

    .tail-part.seg1 {
      bottom: 48px;
      right: 12px;
      width: 70px;
      height: 38px;
      transform: rotate(10deg);
      border-bottom: none;
    }

    .tail-part.seg2 {
      bottom: 72px;
      right: 54px;
      width: 38px;
      height: 95px;
      transform: rotate(-5deg);
    }

    .tail-part.seg3 {
      bottom: 152px;
      right: 68px;
      width: 105px;
      height: 52px;
      transform: rotate(5deg);
    }

    /* Flat Geometric Tip */
    .tail-part.tip {
      bottom: 185px;
      right: 110px;
      width: 135px;
      height: 115px;
      clip-path: polygon(100% 100%, 40% 100%, 0% 40%, 45% 0%, 100% 45%);
      border: none;
    }

    /* --- THE HEAD (Strictly 2D Flat Shape) --- */
    .pikachu-head {
      position: relative;
      width: 360px;
      height: 310px;
      background-color: #F8D030;
      border: 6px solid #232323; /* Line weight increased to stand out */
      border-radius: 50% 50% 46% 46% / 62% 62% 38% 38%;
      box-sizing: border-box;
      z-index: 4;
    }

    /* --- CLASSIC ROUNDED EARS --- */
    .ear {
      position: absolute;
      top: -125px;
      width: 88px;
      height: 215px;
      background-color: #F8D030;
      border: 6px solid #232323;
      border-radius: 50% 50% 45% 45% / 75% 75% 25% 25%;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* Flat Black Ear Tip */
    .ear::before {
      content: '';
      position: absolute;
      top: -20px;
      left: -20px;
      width: 130px;
      height: 85px;
      background-color: #232323;
    }

    .ear.left {
      left: 10px;
      transform: rotate(-32deg);
    }

    .ear.right {
      right: 10px;
      transform: rotate(32deg);
    }

    /* --- FLAT FACE DETAILS --- */
    .eye {
      position: absolute;
      top: 110px;
      width: 52px;
      height: 52px;
      background-color: #232323;
      border-radius: 50%;
    }

    /* Crisp 2D Highlights */
    .eye::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 8px;
      width: 18px;
      height: 18px;
      background-color: #ffffff;
      border-radius: 50%;
    }

    .eye::before {
      content: '';
      position: absolute;
      bottom: 11px;
      right: 11px;
      width: 8px;
      height: 8px;
      background-color: #ffffff;
      border-radius: 50%;
    }

    .eye.left { left: 75px; }
    .eye.right { right: 75px; }

    /* Flat Red Cheeks Placed High and Wide */
    .cheek {
      position: absolute;
      top: 155px;
      width: 72px;
      height: 72px;
      background-color: #E62829;
      border: 6px solid #232323;
      border-radius: 50%;
      box-sizing: border-box;
    }

    .cheek.left { left: 8px; }
    .cheek.right { right: 8px; }

    /* Flat Triangle Nose */
    .nose {
      position: absolute;
      top: 156px;
      left: 50%;
      width: 14px;
      height: 9px;
      background-color: #232323;
      transform: translateX(-50%);
      border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    }

    /* Crisp Outlined Mouth Container */
    .mouth-container {
      position: absolute;
      top: 168px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 75px;
      overflow: hidden;
    }

    .lip {
      position: absolute;
      top: -18px;
      width: 46px;
      height: 32px;
      border: 6px solid #232323;
      background-color: #F8D030;
      border-radius: 0 0 50% 50%;
      box-sizing: border-box;
    }

    .lip.left { left: 5px; border-right-width: 4px; transform: rotate(-2deg); }
    .lip.right { right: 5px; border-left-width: 4px; transform: rotate(2deg); }

    .open-mouth {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 48px;
      height: 44px;
      background-color: #B33235;
      border-radius: 0 0 50% 50%;
      overflow: hidden;
      border: 6px solid #232323;
      border-top: none;
      box-sizing: border-box;
    }

    .open-mouth::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 50%;
      transform: translateX(-50%);
      width: 42px;
      height: 26px;
      background-color: #EA787A;
      border: 5px solid #232323;
      border-radius: 50% 50% 0 0;
      box-sizing: border-box;
    }

    /* --- FLAT CHUBBY BODY --- */
    .pikachu-body {
      position: relative;
      width: 320px;
      height: 290px;
      background-color: #F8D030;
      border: 6px solid #232323;
      border-radius: 50% 50% 42% 42% / 45% 45% 55% 55%;
      margin-top: -70px;
      box-sizing: border-box;
      z-index: 3;
    }

    /* --- FLAT ARMS --- */
    .arm {
      position: absolute;
      top: 60px;
      width: 65px;
      height: 110px;
      background-color: #F8D030;
      border: 6px solid #232323;
      border-radius: 40% 40% 45% 45% / 30% 30% 70% 70%;
      box-sizing: border-box;
    }

    .arm.left {
      left: 30px;
      transform: rotate(35deg);
    }

    .arm.right {
      right: 30px;
      transform: rotate(-35deg);
    }

    .arm::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 35px;
      height: 10px;
      background: radial-gradient(circle, #232323 60%, transparent 65%);
      background-size: 8px 10px;
    }

    /* --- FLAT LEGS & FEET --- */
    .leg {
      position: absolute;
      bottom: -12px;
      width: 95px;
      height: 55px;
      background-color: #F8D030;
      border: 6px solid #232323;
      box-sizing: border-box;
      z-index: 4;
    }

    .leg.left {
      left: 20px;
      border-radius: 55% 45% 45% 55% / 70% 70% 30% 30%;
      transform: rotate(-5deg);
    }

    .leg.right {
      right: 20px;
      border-radius: 45% 55% 55% 45% / 70% 70% 30% 30%;
      transform: rotate(5deg);
    }

    .leg::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 45px;
      height: 12px;
      background: radial-gradient(circle, #232323 30%, transparent 35%);
      background-size: 15px 12px;
    }
    .leg.left::after { left: 12px; }
    .leg.right::after { right: 12px; }
  </style>
</head>
<body>

  <div class="stage-shadow"></div>

  <div class="pikachu-canvas">
    
    <!-- Flat Lightning Bolt Tail -->
    <div class="tail-container">
      <div class="tail-part tip"></div>
      <div class="tail-part seg3"></div>
      <div class="tail-part seg2"></div>
      <div class="tail-part seg1"></div>
      <div class="tail-part base"></div>
    </div>

    <!-- Outlined Head -->
    <div class="pikachu-head">
      <div class="ear left"></div>
      <div class="ear right"></div>
      <div class="eye left"></div>
      <div class="eye right"></div>
      <div class="nose"></div>
      <div class="mouth-container">
        <div class="open-mouth"></div>
        <div class="lip left"></div>
        <div class="lip right"></div>
      </div>
      <div class="cheek left"></div>
      <div class="cheek right"></div>
    </div>

    <!-- Outlined Torso -->
    <div class="pikachu-body">
      <div class="arm left"></div>
      <div class="arm right"></div>
      <div class="leg left"></div>
      <div class="leg right"></div>
    </div>

  </div>

</body>
</html>
