<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pikachu</title>
  <style>
    /* --- CSS Reset & Canvas --- */
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    /* The Main Canvas - Pikachu's Head Base */
    .pikachu {
      position: relative;
      width: 400px;
      height: 350px;
      background-color: #F8D030; /* Classic Pikachu Yellow */
      border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; /* Organic head shape */
      box-shadow: inset 0 -10px 20px rgba(0,0,0,0.05), 0 10px 25px rgba(0,0,0,0.1);
    }

    /* --- Ears --- */
    .ear {
      position: absolute;
      top: -120px;
      width: 60px;
      height: 200px;
      background-color: #F8D030;
      border-radius: 50% 50% 50% 50% / 70% 70% 30% 30%;
      overflow: hidden; /* Clips the black tips */
    }

    /* Black tip using a pseudo-element */
    .ear::before {
      content: '';
      position: absolute;
      top: -20px;
      left: -10px;
      width: 80px;
      height: 70px;
      background-color: #000000;
      transform: rotate(-10px);
    }

    .ear.left {
      left: 20px;
      transform: rotate(-25deg);
    }

    .ear.right {
      right: 20px;
      transform: rotate(25deg);
    }

    /* --- Eyes --- */
    .eye {
      position: absolute;
      top: 120px;
      width: 55px;
      height: 55px;
      background-color: #232323;
      border-radius: 50%;
    }

    /* Eye Highlight (Pupil reflection) */
    .eye::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 10px;
      width: 18px;
      height: 18px;
      background-color: #FFFFFF;
      border-radius: 50%;
    }

    .eye.left { left: 80px; }
    .eye.right { right: 80px; }

    /* --- Cheeks --- */
    .cheek {
      position: absolute;
      top: 185px;
      width: 65px;
      height: 65px;
      background-color: #E62829; /* Electric Red */
      border-radius: 50%;
    }

    .cheek.left { left: 25px; }
    .cheek.right { right: 25px; }

    /* --- Nose --- */
    .nose {
      position: absolute;
      top: 165px;
      left: 50%;
      width: 12px;
      height: 8px;
      background-color: #232323;
      transform: translateX(-50%);
      border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%; /* Soft triangle shape */
    }

    /* --- Mouth --- */
    .mouth-container {
      position: absolute;
      top: 180px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 60px;
      overflow: hidden; /* Cuts off the bottom of the lip curves */
    }

    /* The "Cat Mouth" Curves (W shape) */
    .lip {
      position: absolute;
      top: -15px;
      width: 44px;
      height: 30px;
      border: 4px solid #232323;
      background-color: #F8D030; /* Matches skin to mask the overlap */
      border-radius: 0 0 50% 50%;
    }

    .lip.left {
      left: 6px;
      border-right: 3px solid #232323;
    }

    .lip.right {
      right: 6px;
      border-left: 3px solid #232323;
    }

    /* Open Mouth Tongue (Layered behind the lips dynamically by HTML order) */
    .open-mouth {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 45px;
      background-color: #A22B2D;
      border-radius: 0 0 50% 50%;
      overflow: hidden;
      border: 4px solid #232323;
      border-top: none;
    }

    .open-mouth::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 45px;
      height: 30px;
      background-color: #EA787A; /* Light pink tongue */
      border-radius: 50% 50% 0 0;
    }
  </style>
</head>
<body>

  <!-- Pikachu Base Canvas -->
  <div class="pikachu">
    
    <!-- Ears -->
    <div class="ear left"></div>
    <div class="ear right"></div>
    
    <!-- Eyes -->
    <div class="eye left"></div>
    <div class="eye right"></div>
    
    <!-- Nose -->
    <div class="nose"></div>
    
    <!-- Mouth Layer -->
    <div class="mouth-container">
      <div class="open-mouth"></div>
      <div class="lip left"></div>
      <div class="lip right"></div>
    </div>
    
    <!-- Cheeks -->
    <div class="cheek left"></div>
    <div class="cheek right"></div>
    
  </div>

</body>
</html>
