<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pikachu</title>
  <style>
    /* --- CSS Reset & Canvas --- */
    body {
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: sans-serif;
    }

    /* The Main Canvas - Pikachu's Head Base with Depth & Shading */
    .pikachu {
      position: relative;
      width: 400px;
      height: 350px;
      background-color: #F8D030; /* Classic Pikachu Yellow */
      border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; /* Organic head shape */
      /* Added complex shadow for a 3D feel: rich shadow on bottom-right, soft rim light on top-left */
      box-shadow: 
        inset -18px -18px 30px rgba(200, 140, 20, 0.35), 
        inset 12px 12px 20px rgba(255, 255, 255, 0.6), 
        0 15px 30px rgba(0,0,0,0.12);
    }

    /* --- Ears: Re-proportioned to be thicker and rounded at the base --- */
    .ear {
      position: absolute;
      top: -130px;
      width: 85px; /* Thicker classic profile */
      height: 210px;
      background-color: #F8D030;
      border-radius: 50% 50% 45% 45% / 70% 70% 30% 30%;
      overflow: hidden; /* Clips the black tips */
      /* Added depth shading to the ears */
      box-shadow: 
        inset -8px -4px 15px rgba(200, 140, 20, 0.3),
        inset 6px 6px 10px rgba(255, 255, 255, 0.5);
    }

    /* Black tip adjustments for the broader ear shape */
    .ear::before {
      content: '';
      position: absolute;
      top: -25px;
      left: -15px;
      width: 120px;
      height: 85px;
      background-color: #000000;
    }

    .ear.left {
      left: 15px;
      transform: rotate(-28deg);
    }

    .ear.right {
      right: 15px;
      transform: rotate(28deg);
    }

    /* --- Eyes --- */
    .eye {
      position: absolute;
      top: 120px;
      width: 55px;
      height: 55px;
      background-color: #232323;
      border-radius: 50%;
    }

    /* Primary Eye Highlight */
    .eye::after {
      content: '';
      position: absolute;
      top: 8px;
      left: 10px;
      width: 18px;
      height: 18px;
      background-color: #FFFFFF;
      border-radius: 50%;
    }

    /* Secondary Eye Highlight for an expressive, "alive" look */
    .eye::before {
      content: '';
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      background-color: #FFFFFF;
      border-radius: 50%;
      z-index: 2;
    }

    .eye.left { left: 80px; }
    .eye.right { right: 80px; }

    /* --- Cheeks: Shifted higher and further out toward the edges --- */
    .cheek {
      position: absolute;
      top: 168px; /* Moved up from 185px */
      width: 68px;
      height: 68px;
      background-color: #E62829; /* Electric Red */
      border-radius: 50%;
      box-shadow: inset -4px -4px 10px rgba(150, 10, 15, 0.2); /* Subtle blending shadow */
    }

    .cheek.left { left: 12px; }  /* Moved outward from 25px */
    .cheek.right { right: 12px; } /* Moved outward from 25px */

    /* --- Nose: Scaled up slightly for enhanced presence --- */
    .nose {
      position: absolute;
      top: 164px;
      left: 50%;
      width: 15px; /* Increased size for better contrast */
      height: 10px;
      background-color: #232323;
      transform: translateX(-50%);
      border-radius: 50% 50% 50% 50% / 35% 35% 65% 65%;
    }

    /* --- Mouth: Line weights thickened to 6px to stand out beautifully --- */
    .mouth-container {
      position: absolute;
      top: 178px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 60px;
      overflow: hidden;
    }

    /* Thickened "Cat Mouth" Curves */
    .lip {
      position: absolute;
      top: -17px;
      width: 44px;
      height: 32px;
      border: 6px solid #232323; /* Line weight increased from 4px */
      background-color: #F8D030; 
      border-radius: 0 0 50% 50%;
    }

    .lip.left {
      left: 4px;
      border-right: 4px solid #232323;
    }

    .lip.right {
      right: 4px;
      border-left: 4px solid #232323;
    }

    /* Open Mouth Outline Adjustments */
    .open-mouth {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 50px;
      height: 45px;
      background-color: #A22B2D;
      border-radius: 0 0 50% 50%;
      overflow: hidden;
      border: 6px solid #232323; /* Line weight increased from 4px */
      border-top: none;
    }

    .open-mouth::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 45px;
      height: 30px;
      background-color: #EA787A;
      border-radius: 50% 50% 0 0;
    }
  </style>
</head>
<body>

  <!-- Pikachu Base Canvas -->
  <div class="pikachu">
    
    <!-- Ears -->
    <div class="ear left"></div>
    <div class="ear right"></div>
    
    <!-- Eyes -->
    <div class="eye left"></div>
    <div class="eye right"></div>
    
    <!-- Nose -->
    <div class="nose"></div>
    
    <!-- Mouth Layer -->
    <div class="mouth-container">
      <div class="open-mouth"></div>
      <div class="lip left"></div>
      <div class="lip right"></div>
    </div>
    
    <!-- Cheeks -->
    <div class="cheek left"></div>
    <div class="cheek right"></div>
    
  </div>

</body>
</html>
